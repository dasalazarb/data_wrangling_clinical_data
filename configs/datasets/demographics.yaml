dataset_id: demographics
path: data/raw/demographics.csv
file_type: csv
primary_key: patient_id
required_columns:
  - patient_id
  - sex
  - birth_date
  - race
optional_columns:
  - ethnicity
  - death_date
  - index_date
expected_dtypes:
  patient_id: string
  sex: string
  birth_date: date
  race: string
  ethnicity: string
  death_date: date
  index_date: date
allowed_values:
  sex: [M, F, U]
rules:
  - name: patient_id_not_blank
    type: not_blank
    column: patient_id
  - name: birth_date_not_future
    type: date_not_future
    column: birth_date
  - name: death_after_birth
    type: compare_dates
    left: death_date
    operator: ">="
    right: birth_date
  - name: index_after_birth
    type: compare_dates
    left: index_date
    operator: ">="
    right: birth_date
