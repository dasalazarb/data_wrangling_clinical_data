dataset_id: outcomes
path: data/raw/outcomes.csv
file_type: csv
primary_key: patient_id
required_columns:
  - patient_id
  - severe_disease
  - last_followup_date
optional_columns:
  - event_date
expected_dtypes:
  patient_id: string
  severe_disease: string
  last_followup_date: date
  event_date: date
allowed_values:
  severe_disease: [Y, N]
rules:
  - name: severe_disease_allowed
    type: in_set
    column: severe_disease
    values: [Y, N]
  - name: event_before_followup
    type: compare_dates
    left: last_followup_date
    operator: ">="
    right: event_date
    allow_na: true
