dataset_id: visits
path: data/raw/visits.csv
file_type: csv
primary_key: visit_id
required_columns:
  - visit_id
  - patient_id
  - visit_date
  - essdai
optional_columns:
  - esspri
expected_dtypes:
  visit_id: string
  patient_id: string
  visit_date: date
  essdai: numeric
  esspri: numeric
rules:
  - name: patient_id_not_blank
    type: not_blank
    column: patient_id
  - name: essdai_valid_range
    type: between
    column: essdai
    min: 0
    max: 123
  - name: esspri_valid_range
    type: between
    column: esspri
    min: 0
    max: 10
    allow_na: true
