project_name: sjogren_clinical_data_pipeline
run_name_prefix: sjogren_pipeline
paths:
  raw_dir: data/raw
  staging_dir: data/staging
  curated_dir: data/curated
  analytic_dir: data/analytic
  excluded_dir: data/excluded
  reports_dir: reports
  logs_dir: logs
settings:
  fail_fast: false
  log_level: INFO

single_workbook_input:
  enabled: true
  path: data/raw/CTDB Data Download.xlsx
  sheet_name: 0
  header_strategy: ctdb_merged_v1
  demographics_column_end: N
  demographics_header_row: 3
  clinical_header_row: 2
  skip_rows_after_header: 0
  patient_id_column: patient_id
  domains:
    demographics:
      columns:
        - patient_id
        - sex
        - birth_date
        - race
        - ethnicity
        - death_date
        - index_date
    visits:
      columns:
        - visit_id
        - patient_id
        - visit_date
        - essdai
        - esspri
    labs:
      columns:
        - lab_id
        - patient_id
        - visit_date
        - ana_positive
        - rf_value
        - anti_ena
    outcomes:
      columns:
        - patient_id
        - severe_disease
        - last_followup_date
        - event_date

datasets:
  - configs/files/demographics.yaml
  - configs/files/visits.yaml
  - configs/files/labs.yaml
  - configs/files/outcomes.yaml

merge_plan_config: configs/merges/patient_pipeline_merges.yaml
