project_name: sjogren_clinical_pipeline
run_name_prefix: sjogren_pipeline
paths:
  raw_dir: data/raw
  staging_dir: data/staging
  curated_dir: data/curated
  analytic_dir: data/analytic
  excluded_dir: data/excluded
  reports_dir: reports
  logs_dir: logs
settings:
  fail_fast: false
  log_level: INFO

datasets:
  - configs/datasets/demographics.yaml
  - configs/datasets/visits.yaml
  - configs/datasets/labs.yaml
  - configs/datasets/outcomes.yaml

merge_plan:
  steps:
    - name: demographics_visits
      left_dataset: demographics
      right_dataset: visits
      how: left
      "on": [patient_id]
      expected_relationship: one_to_many
    - name: patient_visits_labs
      left_dataset: demographics_visits
      right_dataset: labs
      how: left
      "on": [patient_id, visit_date]
      expected_relationship: one_to_one_or_many
    - name: patient_visits_labs_outcomes
      left_dataset: patient_visits_labs
      right_dataset: outcomes
      how: left
      "on": [patient_id]
      expected_relationship: one_to_one
